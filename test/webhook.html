<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; }
        #feedback-sectie { font-family: sans-serif; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; width: fit-content; background: white; }
        button { cursor: pointer; padding: 8px 16px; margin-right: 5px; border-radius: 5px; border: 1px solid #0078d4; background: white; color: #0078d4; font-weight: bold; }
        button:hover { background: #0078d4; color: white; }
    </style>
</head>
<body>

    <div id="feedback-sectie">
        <div id="feedback-keuze">
            <p style="margin-top:0">Heeft dit u geholpen?</p>
            <button onclick="stuurFeedback('👍 Nuttig')">Ja</button>
            <button onclick="stuurFeedback('👎 Niet nuttig')">Nee</button>
        </div>
        <div id="feedback-bedankt" style="display: none;">
            <p><strong>Bedankt!</strong></p>
        </div>
    </div>

    <script>
    function stuurFeedback(beoordeling) {
        const mijnFlowUrl = "https://defaulta1cf89defb6f47888904a28bc3f774.f2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/63403457cd15478c9928d3e8dd5fa3b4/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Qltm6BCyUCirv4n2HtdlI9OkY-LQp-F3REe5Ngoi0Lk";
        
        // Haal de URL op uit de browser-balk van het iframe zelf
        const urlParams = new URLSearchParams(window.location.search);
        const handmatigeUrl = urlParams.get('page'); 
        
        // Gebruik de 'page' parameter, of val terug op de referrer als die er niet is
        const finaleUrl = handmatigeUrl || document.referrer || "Onbekende Notion pagina";

        const data = {
            page_url: finaleUrl,
            rating: beoordeling
        };

        document.getElementById('feedback-keuze').style.display = 'none';
        document.getElementById('feedback-bedankt').style.display = 'block';

        fetch(mijnFlowUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
    }
    </script>
</body>
</html>
