<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Feedback</title>
    <style>
        #feedback-sectie { font-family: sans-serif; padding: 20px; border: 1px solid #eee; border-radius: 10px; width: fit-content; }
        button { cursor: pointer; padding: 8px 15px; margin-right: 5px; border-radius: 5px; border: 1px solid #ccc; background: white; }
        button:hover { background: #f0f0f0; }
    </style>
</head>
<body>

    <div id="feedback-sectie">
        <div id="feedback-keuze">
            <p>Was deze pagina nuttig?</p>
            <button onclick="stuurFeedback('👍 Nuttig')">👍 Ja</button>
            <button onclick="stuurFeedback('👎 Niet nuttig')">👎 Nee</button>
        </div>
        <div id="feedback-bedankt" style="display: none;">
            <p><strong>Bedankt voor uw feedback!</strong></p>
        </div>
    </div>

    <script>
    function stuurFeedback(beoordeling) {
        // Jouw volledige URL met handtekening
        const mijnFlowUrl = "https://defaulta1cf89defb6f47888904a28bc3f774.f2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/63403457cd15478c9928d3e8dd5fa3b4/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Qltm6BCyUCirv4n2HtdlI9OkY-LQp-F3REe5Ngoi0Lk";
        
        const data = {
            page_url: window.location.href,
            rating: beoordeling
        };

        // Wissel direct de weergave zodat de gebruiker ziet dat er iets gebeurt
        document.getElementById('feedback-keuze').style.display = 'none';
        document.getElementById('feedback-bedankt').style.display = 'block';

        fetch(mijnFlowUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (!response.ok) {
                console.error("Server fout:", response.status);
                alert("Er ging iets mis bij het verzenden naar Teams.");
            }
        })
        .catch(error => {
            console.error("Netwerkfout:", error);
        });
    }
    </script>

</body>
</html>
